<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火影BBS - Naruto Forum</title>
    <style>
        /* =========== 全局样式 =========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        a { color: #f0c040; text-decoration: none; }
        a:hover { color: #ffd866; }

        /* =========== 头部导航 =========== */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #f0c040;
            box-shadow: 0 2px 20px rgba(240, 192, 64, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #f0c040;
            text-shadow: 0 0 20px rgba(240, 192, 64, 0.3);
        }
        .logo span { color: #ff6b35; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-right .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f0c040, #ff8c00);
            color: #1a1a2e;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(240, 192, 64, 0.4);
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-danger:hover { background: #c0392b; }
        .btn-success {
            background: #27ae60;
            color: #fff;
        }
        .btn-success:hover { background: #1e8449; }
        .btn-outline {
            background: transparent;
            border: 1px solid #f0c040;
            color: #f0c040;
        }
        .btn-outline:hover {
            background: #f0c040;
            color: #1a1a2e;
        }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f0c040;
            font-weight: 600;
        }
        .user-info .role-badge {
            font-size: 11px;
            background: #f0c040;
            color: #1a1a2e;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .user-info .role-badge.admin { background: #e74c3c; color: #fff; }

        /* =========== 主容器 =========== */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* =========== 模态框 =========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1e1e36;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #333;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal h2 {
            color: #f0c040;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .modal label {
            display: block;
            margin-bottom: 6px;
            color: #aaa;
            font-size: 14px;
        }
        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 16px;
            background: #2a2a45;
            border: 1px solid #444;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        .modal input:focus, .modal textarea:focus {
            border-color: #f0c040;
        }
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        .modal .btn-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .modal .btn-row .btn { flex: 1; max-width: 140px; }
        .modal .close-btn {
            float: right;
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        .modal .close-btn:hover { color: #fff; }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }

        /* =========== 帖子列表 =========== */
        .forum-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 14px 20px;
            background: #1a1a30;
            border-radius: 12px;
            border: 1px solid #2a2a45;
            font-size: 14px;
            color: #aaa;
            flex-wrap: wrap;
        }
        .forum-stats strong { color: #f0c040; }

        .post-card {
            background: #1a1a30;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 14px;
            border: 1px solid #2a2a45;
            transition: all 0.3s;
            position: relative;
        }
        .post-card:hover {
            border-color: #f0c04044;
            box-shadow: 0 4px 20px rgba(240, 192, 64, 0.08);
        }
        .post-card.pinned {
            border-left: 4px solid #f0c040;
            background: linear-gradient(135deg, #1a1a30 0%, #1e1e38 100%);
        }
        .post-card .pin-badge {
            display: inline-block;
            background: #f0c040;
            color: #1a1a2e;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-right: 8px;
        }
        .post-card .post-title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin: 4px 0 8px 0;
            cursor: pointer;
        }
        .post-card .post-title:hover { color: #f0c040; }
        .post-card .post-meta {
            font-size: 12px;
            color: #777;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .post-card .post-meta .author {
            color: #f0c040;
            font-weight: 600;
        }
        .post-card .post-content {
            margin: 12px 0;
            line-height: 1.7;
            color: #ccc;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .post-card .post-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .post-card .post-actions .btn {
            padding: 5px 14px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-like {
            background: transparent;
            border: 1px solid #555 !important;
            color: #aaa;
        }
        .btn-like:hover { border-color: #f0c040 !important; color: #f0c040; }
        .btn-like.liked {
            background: #f0c04022;
            border-color: #f0c040 !important;
            color: #f0c040;
        }
        .btn-reply {
            background: transparent;
            border: 1px solid #555 !important;
            color: #aaa;
        }
        .btn-reply:hover { border-color: #27ae60 !important; color: #27ae60; }
        .btn-pin {
            background: transparent;
            border: 1px solid #555 !important;
            color: #aaa;
        }
        .btn-pin:hover { border-color: #f0c040 !important; color: #f0c040; }
        .btn-del {
            background: transparent;
            border: 1px solid #555 !important;
            color: #aaa;
        }
        .btn-del:hover { border-color: #e74c3c !important; color: #e74c3c; }

        .like-count { font-size: 12px; color: #f0c040; margin-left: 4px; }

        /* =========== 回复区域 =========== */
        .replies-section {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #2a2a45;
            display: none;
        }
        .replies-section.open { display: block; }
        .reply-item {
            padding: 12px 14px;
            background: #151528;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .reply-item .reply-meta {
            font-size: 12px;
            color: #777;
            margin-bottom: 4px;
        }
        .reply-item .reply-meta .author { color: #f0c040; font-weight: 600; }
        .reply-item .reply-content { color: #ccc; line-height: 1.5; white-space: pre-wrap; }
        .reply-item .reply-actions { margin-top: 6px; }
        .reply-item .reply-actions .btn {
            padding: 2px 10px;
            font-size: 11px;
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            border-radius: 4px;
            cursor: pointer;
        }
        .reply-item .reply-actions .btn:hover { border-color: #e74c3c; color: #e74c3c; }

        .reply-form {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .reply-form input {
            flex: 1;
            padding: 8px 14px;
            background: #2a2a45;
            border: 1px solid #444;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
        }
        .reply-form input:focus { border-color: #27ae60; }
        .reply-form .btn { padding: 8px 16px; font-size: 13px; }

        /* =========== 空状态 =========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

        /* =========== 管理员面板 =========== */
        .admin-panel {
            background: #1a1a30;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e74c3c44;
        }
        .admin-panel h3 { color: #e74c3c; margin-bottom: 12px; }
        .admin-panel table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .admin-panel th, .admin-panel td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a45;
        }
        .admin-panel th { color: #aaa; font-weight: 600; }
        .admin-panel td { color: #ccc; }
        .admin-panel .btn { font-size: 11px; padding: 3px 10px; }

        /* =========== Toast 提示 =========== */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            z-index: 300;
            transform: translateX(120%);
            transition: transform 0.4s ease;
            box-shadow: 0 6px 24px rgba(0,0,0,0.4);
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        .toast.info { background: #2980b9; }

        /* =========== 响应式 =========== */
        @media (max-width: 640px) {
            .header { padding: 12px 16px; flex-direction: column; gap: 10px; }
            .header-right { width: 100%; justify-content: center; }
            .post-card { padding: 16px; }
            .post-card .post-title { font-size: 16px; }
            .modal { padding: 20px; }
            .forum-stats { font-size: 12px; gap: 10px; }
            .admin-panel table { font-size: 11px; }
            .admin-panel th, .admin-panel td { padding: 5px 8px; }
        }

        /* =========== 滚动条 =========== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

<!-- ========== 顶部导航 ========== -->
<header class="header">
    <div class="logo">🍥 火影<span>BBS</span></div>
    <div class="header-right" id="headerRight">
        <!-- 由 JS 动态渲染 -->
    </div>
</header>

<!-- ========== 主容器 ========== -->
<div class="container" id="app">
    <!-- 论坛统计 -->
    <div class="forum-stats" id="forumStats">
        <span>📊 帖子总数: <strong id="totalPosts">0</strong></span>
        <span>👥 注册用户: <strong id="totalUsers">0</strong></span>
        <span>🕐 最后更新: <strong id="lastUpdate">-</strong></span>
    </div>

    <!-- 管理员面板 -->
    <div class="admin-panel" id="adminPanel" style="display:none;">
        <h3>⚙️ 管理面板</h3>
        <div id="adminUserList"></div>
    </div>

    <!-- 帖子列表 -->
    <div id="postList"></div>
</div>

<!-- ========== 模态框：登录/注册 ========== -->
<div class="modal-overlay" id="authModal">
    <div class="modal">
        <button class="close-btn" onclick="closeModal('authModal')">&times;</button>
        <h2 id="authTitle">登录</h2>
        <div class="error-msg" id="authError"></div>
        <label>用户名</label>
        <input type="text" id="authUsername" placeholder="输入用户名..." maxlength="20">
        <label>密码</label>
        <input type="password" id="authPassword" placeholder="输入密码..." onkeydown="if(event.key==='Enter') submitAuth()">
        <div class="btn-row">
            <button class="btn btn-outline" id="authToggleBtn" onclick="toggleAuthMode()">注册新账号</button>
            <button class="btn btn-primary" onclick="submitAuth()" id="authSubmitBtn">登录</button>
        </div>
    </div>
</div>

<!-- ========== 模态框：发帖 ========== -->
<div class="modal-overlay" id="postModal">
    <div class="modal">
        <button class="close-btn" onclick="closeModal('postModal')">&times;</button>
        <h2>📝 发新帖</h2>
        <div class="error-msg" id="postError"></div>
        <label>标题</label>
        <input type="text" id="postTitle" placeholder="帖子标题..." maxlength="100">
        <label>内容</label>
        <textarea id="postContent" placeholder="写下你想说的话..." maxlength="5000"></textarea>
        <div class="btn-row">
            <button class="btn btn-outline" onclick="closeModal('postModal')">取消</button>
            <button class="btn btn-primary" onclick="submitPost()">发布帖子</button>
        </div>
    </div>
</div>

<!-- ========== Toast 提示 ========== -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//                      BBS 主程序
// ============================================================

const API = 'https://narutolit.site.je/api.php';

// ---------- 状态 ----------
let state = {
    currentUser: null,       // { username, role, user_id }
    posts: [],
    users: [],
    authMode: 'login'       // 'login' | 'register'
};

// ---------- DOM 引用 ----------
const $ = id => document.getElementById(id);
const headerRight = $('headerRight');
const postList = $('postList');
const forumStats = $('forumStats');
const adminPanel = $('adminPanel');
const adminUserList = $('adminUserList');

// ---------- Toast 提示 ----------
let toastTimer = null;
function showToast(msg, type = 'success') {
    const t = $('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    clearTimeout(toastTimer);
    // 触发重排
    void t.offsetWidth;
    t.classList.add('show');
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ---------- 模态框 ----------
function openModal(id) { $(id).classList.add('active'); }
function closeModal(id) { $(id).classList.remove('active'); }
// 点击遮罩关闭
document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('active');
    });
});

// ---------- API 请求 ----------
async function api(action, data = {}) {
    try {
        const resp = await fetch(`${API}?action=${action}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return await resp.json();
    } catch (e) {
        showToast('网络错误: ' + e.message, 'error');
        return { success: false, error: e.message };
    }
}

// ============================================================
//                     认证系统
// ============================================================

function toggleAuthMode() {
    state.authMode = state.authMode === 'login' ? 'register' : 'login';
    const title = $('authTitle');
    const btn = $('authSubmitBtn');
    const toggle = $('authToggleBtn');
    if (state.authMode === 'login') {
        title.textContent = '🔑 登录';
        btn.textContent = '登录';
        toggle.textContent = '注册新账号';
    } else {
        title.textContent = '📝 注册';
        btn.textContent = '注册';
        toggle.textContent = '已有账号？去登录';
    }
    $('authError').style.display = 'none';
}

function openAuthModal() {
    state.authMode = 'login';
    $('authTitle').textContent = '🔑 登录';
    $('authSubmitBtn').textContent = '登录';
    $('authToggleBtn').textContent = '注册新账号';
    $('authUsername').value = '';
    $('authPassword').value = '';
    $('authError').style.display = 'none';
    openModal('authModal');
}

async function submitAuth() {
    const username = $('authUsername').value.trim();
    const password = $('authPassword').value;
    const err = $('authError');

    if (!username || !password) {
        err.textContent = '请填写用户名和密码';
        err.style.display = 'block';
        return;
    }

    const action = state.authMode === 'login' ? 'login' : 'register';
    const result = await api(action, { username, password });

    if (result.success) {
        closeModal('authModal');
        if (action === 'login') {
            state.currentUser = { username: result.username, role: result.role, user_id: result.user_id };
            showToast(`欢迎回来，${result.username}！`, 'success');
        } else {
            state.currentUser = { username: result.username, role: result.role, user_id: 0 };
            showToast(`注册成功！欢迎 ${result.username}`, 'success');
        }
        renderHeader();
        loadAll();
    } else {
        err.textContent = result.error || '操作失败';
        err.style.display = 'block';
    }
}

function logout() {
    state.currentUser = null;
    renderHeader();
    loadAll();
    showToast('已退出登录', 'info');
}

// ============================================================
//                     渲染函数
// ============================================================

function renderHeader() {
    const user = state.currentUser;
    if (!user) {
        headerRight.innerHTML = `
            <button class="btn btn-outline" onclick="openAuthModal()">🔑 登录</button>
            <button class="btn btn-primary" onclick="openAuthModal(); toggleAuthMode();">📝 注册</button>
            <button class="btn btn-outline" onclick="openPostModalGuest()">📝 游客发帖</button>
        `;
        return;
    }
    const roleBadge = user.role === 'admin'
        ? '<span class="role-badge admin">管理员</span>'
        : '<span class="role-badge">用户</span>';
    headerRight.innerHTML = `
        <div class="user-info">
            👤 ${user.username} ${roleBadge}
        </div>
        <button class="btn btn-primary" onclick="openPostModal()">📝 发帖</button>
        ${user.role === 'admin' ? '<button class="btn btn-danger btn-sm" onclick="loadAdminPanel()">⚙️ 管理</button>' : ''}
        <button class="btn btn-outline" onclick="logout()">🚪 退出</button>
    `;
}

function renderPosts() {
    const container = postList;
    const posts = state.posts;

    if (!posts || posts.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="icon">📭</div>
                <div>暂无帖子，快来发表第一篇吧！</div>
            </div>
        `;
        return;
    }

    let html = '';
    posts.forEach(p => {
        const isPinned = p.is_pinned == 1;
        const isOwner = state.currentUser && state.currentUser.username === p.username;
        const isAdmin = state.currentUser && state.currentUser.role === 'admin';
        const canDelete = isOwner || isAdmin;
        const canPin = isAdmin;
        const canReply = state.currentUser && state.currentUser.username !== 'guest';
        const isGuest = state.currentUser && state.currentUser.username === 'guest';

        const pinnedClass = isPinned ? 'pinned' : '';
        const pinBadge = isPinned ? '<span class="pin-badge">📌 置顶</span>' : '';

        html += `
        <div class="post-card ${pinnedClass}" data-id="${p.id}">
            <div class="post-meta">
                ${pinBadge}
                <span>#${p.id}</span>
                <span class="author">👤 ${p.username}</span>
                <span>🕐 ${p.created_at}</span>
                <span>💬 ${p.reply_count || 0}</span>
            </div>
            <div class="post-title" onclick="toggleReplies(${p.id})">${escapeHtml(p.title)}</div>
            <div class="post-content">${escapeHtml(p.content)}</div>
            <div class="post-actions">
                <button class="btn btn-like ${p.liked_by_me ? 'liked' : ''}" onclick="toggleLike(${p.id})">
                    ${p.liked_by_me ? '❤️' : '🤍'} <span class="like-count">${p.like_count || 0}</span>
                </button>
                ${canReply ? `<button class="btn btn-reply" onclick="toggleReplies(${p.id}); focusReply(${p.id})">💬 回复</button>` : ''}
                ${isGuest ? `<span style="font-size:11px;color:#888;">(游客不能回复)</span>` : ''}
                ${canPin ? `<button class="btn btn-pin" onclick="togglePin(${p.id})">${isPinned ? '📌 取消置顶' : '📌 置顶'}</button>` : ''}
                ${canDelete ? `<button class="btn btn-del" onclick="deletePost(${p.id})">🗑️ 删除</button>` : ''}
            </div>
            <div class="replies-section" id="replies-${p.id}">
                <div id="repliesList-${p.id}"></div>
                ${canReply ? `
                <div class="reply-form">
                    <input type="text" id="replyInput-${p.id}" placeholder="写下你的回复..." maxlength="2000"
                        onkeydown="if(event.key==='Enter') submitReply(${p.id})">
                    <button class="btn btn-success btn-sm" onclick="submitReply(${p.id})">回复</button>
                </div>` : `
                <div style="color:#888;font-size:13px;margin-top:8px;">🔒 游客暂不能回复，请登录后回复</div>
                `}
            </div>
        </div>`;
    });
    container.innerHTML = html;

    // 更新统计
    $('totalPosts').textContent = posts.length || 0;
    $('lastUpdate').textContent = new Date().toLocaleTimeString();
}

function renderAdminPanel() {
    if (!state.currentUser || state.currentUser.role !== 'admin') {
        adminPanel.style.display = 'none';
        return;
    }
    adminPanel.style.display = 'block';
    const users = state.users;
    if (!users || users.length === 0) {
        adminUserList.innerHTML = '<p style="color:#888;">暂无用户数据</p>';
        return;
    }
    let html = `<table>
        <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody>`;
    users.forEach(u => {
        const isSelf = state.currentUser && state.currentUser.username === u.username;
        html += `<tr>
            <td>${u.id}</td>
            <td>${u.username}</td>
            <td>${u.role === 'admin' ? '👑 管理员' : '👤 用户'}</td>
            <td>${u.created_at}</td>
            <td>
                ${!isSelf && u.username !== 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.username}')">删除</button>` : '-'}
            </td>
        </tr>`;
    });
    html += '</tbody></table>';
    adminUserList.innerHTML = html;
}

// ============================================================
//                     操作函数
// ============================================================

// 发帖
function openPostModal() {
    if (!state.currentUser) { openAuthModal(); return; }
    $('postTitle').value = '';
    $('postContent').value = '';
    $('postError').style.display = 'none';
    openModal('postModal');
}

function openPostModalGuest() {
    // 游客模式 - 直接发帖
    const guestName = 'guest_' + Math.random().toString(36).substr(2, 4);
    state.currentUser = { username: 'guest', role: 'guest', user_id: -1 };
    renderHeader();
    $('postTitle').value = '';
    $('postContent').value = '';
    $('postError').style.display = 'none';
    openModal('postModal');
    showToast('您正以游客身份发帖', 'info');
}

async function submitPost() {
    const title = $('postTitle').value.trim();
    const content = $('postContent').value.trim();
    const err = $('postError');
    if (!title) { err.textContent = '请输入标题'; err.style.display = 'block'; return; }
    if (!content) { err.textContent = '请输入内容'; err.style.display = 'block'; return; }

    const username = state.currentUser ? state.currentUser.username : 'guest';
    const result = await api('create_post', { username, title, content });
    if (result.success) {
        closeModal('postModal');
        showToast('发帖成功！', 'success');
        loadAll();
    } else {
        err.textContent = result.error || '发帖失败';
        err.style.display = 'block';
    }
}

// 删除帖子
async function deletePost(postId) {
    if (!state.currentUser) { showToast('请先登录', 'error'); return; }
    if (!confirm('确定要删除这个帖子吗？')) return;
    const result = await api('delete_post', {
        post_id: postId,
        username: state.currentUser.username
    });
    if (result.success) {
        showToast('帖子已删除', 'success');
        loadAll();
    } else {
        showToast(result.error || '删除失败', 'error');
    }
}

// 置顶
async function togglePin(postId) {
    if (!state.currentUser) { showToast('请先登录', 'error'); return; }
    const result = await api('toggle_pin', {
        post_id: postId,
        username: state.currentUser.username
    });
    if (result.success) {
        showToast(result.message, 'info');
        loadAll();
    } else {
        showToast(result.error || '操作失败', 'error');
    }
}

// 点赞
async function toggleLike(postId) {
    if (!state.currentUser) { showToast('请先登录', 'error'); return; }
    const result = await api('toggle_like', {
        post_id: postId,
        username: state.currentUser.username
    });
    if (result.success) {
        showToast(result.message, result.liked ? 'success' : 'info');
        loadAll();
    } else {
        showToast(result.error || '操作失败', 'error');
    }
}

// 回复
function toggleReplies(postId) {
    const section = document.getElementById(`replies-${postId}`);
    if (!section) return;
    const isOpen = section.classList.contains('open');
    if (isOpen) {
        section.classList.remove('open');
    } else {
        section.classList.add('open');
        if (!section._loaded) {
            loadReplies(postId);
            section._loaded = true;
        }
    }
}

function focusReply(postId) {
    const input = document.getElementById(`replyInput-${postId}`);
    if (input) setTimeout(() => input.focus(), 300);
}

async function loadReplies(postId) {
    const result = await api('get_replies', { post_id: postId });
    const list = document.getElementById(`repliesList-${postId}`);
    if (!result.success) {
        list.innerHTML = '<div style="color:#e74c3c;">加载回复失败</div>';
        return;
    }
    const replies = result.replies || [];
    if (replies.length === 0) {
        list.innerHTML = '<div style="color:#555;font-size:13px;padding:8px 0;">暂无回复</div>';
        return;
    }
    let html = '';
    replies.forEach(r => {
        const isOwner = state.currentUser && state.currentUser.username === r.username;
        const isAdmin = state.currentUser && state.currentUser.role === 'admin';
        const canDelete = isOwner || isAdmin;
        html += `
        <div class="reply-item">
            <div class="reply-meta">
                <span class="author">👤 ${r.username}</span>
                <span>🕐 ${r.created_at}</span>
            </div>
            <div class="reply-content">${escapeHtml(r.content)}</div>
            ${canDelete ? `
            <div class="reply-actions">
                <button class="btn" onclick="deleteReply(${r.id})">🗑️ 删除</button>
            </div>` : ''}
        </div>`;
    });
    list.innerHTML = html;
}

async function submitReply(postId) {
    if (!state.currentUser) { showToast('请先登录', 'error'); return; }
    if (state.currentUser.username === 'guest') { showToast('游客不能回复', 'error'); return; }
    const input = document.getElementById(`replyInput-${postId}`);
    const content = input.value.trim();
    if (!content) { showToast('请输入回复内容', 'error'); return; }

    const result = await api('create_reply', {
        post_id: postId,
        username: state.currentUser.username,
        content
    });
    if (result.success) {
        input.value = '';
        showToast('回复成功', 'success');
        loadReplies(postId);
        loadAll(); // 更新回复计数
    } else {
        showToast(result.error || '回复失败', 'error');
    }
}

async function deleteReply(replyId) {
    if (!state.currentUser) { showToast('请先登录', 'error'); return; }
    if (!confirm('确定删除此回复吗？')) return;
    const result = await api('delete_reply', {
        reply_id: replyId,
        username: state.currentUser.username
    });
    if (result.success) {
        showToast('回复已删除', 'success');
        // 重新加载所有回复区域
        document.querySelectorAll('.replies-section.open').forEach(s => {
            const id = s.id.replace('replies-', '');
            loadReplies(parseInt(id));
        });
        loadAll();
    } else {
        showToast(result.error || '删除失败', 'error');
    }
}

// 管理员 - 加载用户列表
async function loadAdminPanel() {
    if (!state.currentUser || state.currentUser.role !== 'admin') {
        adminPanel.style.display = 'none';
        return;
    }
    const result = await api('get_users', { username: state.currentUser.username });
    if (result.success) {
        state.users = result.users || [];
        $('totalUsers').textContent = state.users.length || 0;
        renderAdminPanel();
    } else {
        showToast(result.error || '无法加载用户列表', 'error');
    }
    // 滚动到管理面板
    adminPanel.scrollIntoView({ behavior: 'smooth' });
}

async function deleteUser(targetUsername) {
    if (!state.currentUser || state.currentUser.role !== 'admin') return;
    if (!confirm(`确定要删除用户「${targetUsername}」及其所有内容吗？`)) return;
    const result = await api('delete_user', {
        target_username: targetUsername,
        username: state.currentUser.username
    });
    if (result.success) {
        showToast(result.message, 'success');
        loadAdminPanel();
        loadAll();
    } else {
        showToast(result.error || '删除失败', 'error');
    }
}

// ============================================================
//                     数据加载
// ============================================================

async function loadAll() {
    // 加载帖子
    const username = state.currentUser ? state.currentUser.username : '';
    const result = await api('get_posts', { username });
    if (result.success) {
        state.posts = result.posts || [];
        renderPosts();
    } else {
        showToast('加载帖子失败: ' + result.error, 'error');
    }

    // 加载用户总数（用于统计）
    if (state.currentUser && state.currentUser.role === 'admin') {
        const userResult = await api('get_users', { username: state.currentUser.username });
        if (userResult.success) {
            state.users = userResult.users || [];
            $('totalUsers').textContent = state.users.length;
        }
    } else {
        // 非管理员也尝试获取用户数量（公开统计）
        // 使用一个简单的公开API或者仅显示帖子数
        $('totalUsers').textContent = '?';
    }
}

// ============================================================
//                     工具函数
// ============================================================

function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ============================================================
//                     初始化
// ============================================================

(async function init() {
    renderHeader();
    await loadAll();

    // 每60秒自动刷新
    setInterval(loadAll, 60000);

    // 检测是否保存了登录状态（简单localStorage）
    // 实际项目中可扩展此功能
    console.log('🍥 火影BBS 已启动！');
})();
</script>

</body>
</html>
