<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简BBS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            padding: 16px;
            color: #333;
        }
        .container { max-width: 600px; margin: 0 auto; }
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; font-weight: 700; color: #1e80ff; }
        .refresh-btn {
            background: #1e80ff;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        .refresh-btn:active { opacity: 0.7; }
        /* 发帖卡片 */
        .post-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .post-card input, .post-card textarea {
            width: 100%;
            border: 1px solid #e8ecf1;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: border 0.2s;
            font-family: inherit;
            background: #fafbfc;
        }
        .post-card input:focus, .post-card textarea:focus {
            border-color: #1e80ff;
            background: #fff;
        }
        .post-card textarea { height: 80px; resize: vertical; }
        .post-card .row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .post-card .row input { flex: 1; margin-bottom: 0; }
        .submit-btn {
            background: #1e80ff;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .submit-btn:active { opacity: 0.7; }
        .submit-btn:disabled { background: #a0c4ff; cursor: not-allowed; }
        /* 帖子列表 */
        .list-title {
            font-size: 16px;
            font-weight: 600;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .list-title span { background: #e8ecf1; padding: 2px 10px; border-radius: 12px; font-size: 13px; }
        .item {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 14px;
            transition: 0.2s;
        }
        .item .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #8e99ab;
            margin-bottom: 8px;
        }
        .item .meta .name { font-weight: 600; color: #1e80ff; }
        .item .content {
            font-size: 15px;
            line-height: 1.6;
            word-break: break-all;
            margin-bottom: 10px;
        }
        .item .actions {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: #8e99ab;
            border-top: 1px solid #f0f2f5;
            padding-top: 10px;
        }
        .item .actions button {
            background: none;
            border: none;
            color: #8e99ab;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .item .actions button:active { background: #f0f2f5; }
        .item .actions .del-btn { color: #ff4d4f; }
        /* 回复区域 */
        .reply-area {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #e8ecf1;
            display: none;
        }
        .reply-area.show { display: block; }
        .reply-area .row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }
        .reply-area .row input { flex: 1; padding: 8px 12px; border: 1px solid #e8ecf1; border-radius: 8px; font-size: 14px; }
        .reply-area .row button { background: #1e80ff; color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .reply-item {
            font-size: 14px;
            background: #f8f9fc;
            padding: 6px 12px;
            border-radius: 8px;
            margin-top: 6px;
        }
        .reply-item .rname { color: #1e80ff; font-weight: 500; margin-right: 6px; }
        .reply-item .rtime { color: #b0b8c4; font-size: 12px; margin-left: 8px; }
        .empty { text-align: center; color: #b0b8c4; padding: 40px 0; }
        .loading { text-align: center; color: #b0b8c4; padding: 20px 0; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部 -->
        <div class="header">
            <h1>📝 极简BBS</h1>
            <button class="refresh-btn" onclick="fetchPosts()">🔄 刷新</button>
        </div>

        <!-- 发帖 -->
        <div class="post-card">
            <input type="text" id="postUser" placeholder="你的昵称" value="访客">
            <textarea id="postContent" placeholder="说点什么吧..."></textarea>
            <div class="row">
                <input type="text" id="postTitle" placeholder="标题（可选）">
                <button class="submit-btn" onclick="createPost()">发布帖子</button>
            </div>
        </div>

        <!-- 帖子列表 -->
        <div class="list-title">
            <span>📋 全部帖子</span>
            <span id="countBadge">0</span>
        </div>
        <div id="postList"><div class="loading">加载中...</div></div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <script>
        // ========== 配置区 ==========
        // 替换成你的 InfinityFree 域名 + api.php 路径
        const API_BASE = 'https://dash.infinityfree.com/accounts/if0_42334551/domains/narutolit.site.je/api.php'; 
        // ============================

        let posts = [];

        // 显示提示
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        // 获取帖子列表
        async function fetchPosts() {
            const list = document.getElementById('postList');
            list.innerHTML = '<div class="loading">⏳ 加载中...</div>';
            try {
                const res = await fetch(API_BASE);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (data.code === 0) {
                    posts = data.data || [];
                    renderPosts();
                } else {
                    throw new Error(data.msg || '未知错误');
                }
            } catch (e) {
                list.innerHTML = `<div class="empty">❌ 加载失败：${e.message}<br><button onclick="fetchPosts()" style="margin-top:10px;padding:8px 20px;border:1px solid #1e80ff;background:#fff;border-radius:20px;color:#1e80ff;cursor:pointer;">重试</button></div>`;
                showToast('加载失败，请重试');
            }
        }

        // 渲染列表
        function renderPosts() {
            const list = document.getElementById('postList');
            document.getElementById('countBadge').textContent = posts.length;
            if (posts.length === 0) {
                list.innerHTML = '<div class="empty">✨ 还没有帖子，快来抢沙发！</div>';
                return;
            }
            let html = '';
            // 按时间倒序
            const sorted = [...posts].sort((a,b) => b.time - a.time);
            for (const p of sorted) {
                const time = new Date(p.time).toLocaleString('zh-CN');
                const replies = p.replies || [];
                html += `
                    <div class="item" data-id="${p.id}">
                        <div class="meta">
                            <span class="name">👤 ${escapeHtml(p.username)}</span>
                            <span>${time}</span>
                        </div>
                        ${p.title ? `<div style="font-weight:600;font-size:16px;margin-bottom:6px;">${escapeHtml(p.title)}</div>` : ''}
                        <div class="content">${escapeHtml(p.content)}</div>
                        <div class="actions">
                            <span>💬 ${replies.length} 条回复</span>
                            <button onclick="toggleReply('${p.id}')">↩️ 回复</button>
                            <button class="del-btn" onclick="deletePost('${p.id}')">🗑️ 删除</button>
                        </div>
                        <div class="reply-area" id="reply-${p.id}">
                            ${replies.map(r => `<div class="reply-item"><span class="rname">${escapeHtml(r.username)}</span>${escapeHtml(r.content)}<span class="rtime">${new Date(r.time).toLocaleString('zh-CN')}</span></div>`).join('')}
                            <div class="row">
                                <input type="text" id="replyUser-${p.id}" placeholder="昵称" value="访客">
                                <input type="text" id="replyContent-${p.id}" placeholder="说点什么..." style="flex:2;">
                                <button onclick="addReply('${p.id}')">发送</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            list.innerHTML = html;
        }

        // 简单的防XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 切换回复框显隐
        function toggleReply(id) {
            const el = document.getElementById(`reply-${id}`);
            el.classList.toggle('show');
            if (el.classList.contains('show')) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // 发帖
        async function createPost() {
            const username = document.getElementById('postUser').value.trim() || '匿名';
            const content = document.getElementById('postContent').value.trim();
            const title = document.getElementById('postTitle').value.trim();
            if (!content) { showToast('请输入内容'); return; }

            const btn = document.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = '发布中...';

            try {
                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'create', username, content, title })
                });
                const data = await res.json();
                if (data.code === 0) {
                    showToast('✅ 发布成功！');
                    document.getElementById('postContent').value = '';
                    document.getElementById('postTitle').value = '';
                    await fetchPosts();
                } else {
                    showToast('❌ ' + data.msg);
                }
            } catch (e) {
                showToast('❌ 网络错误');
            }
            btn.disabled = false;
            btn.textContent = '发布帖子';
        }

        // 删除帖子
        async function deletePost(id) {
            if (!confirm('确定要删除这条帖子吗？')) return;
            try {
                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete', id })
                });
                const data = await res.json();
                if (data.code === 0) {
                    showToast('已删除');
                    await fetchPosts();
                } else {
                    showToast('❌ ' + data.msg);
                }
            } catch (e) {
                showToast('❌ 网络错误');
            }
        }

        // 添加回复
        async function addReply(postId) {
            const username = document.getElementById(`replyUser-${postId}`).value.trim() || '匿名';
            const content = document.getElementById(`replyContent-${postId}`).value.trim();
            if (!content) { showToast('请输入回复内容'); return; }

            try {
                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'reply', id: postId, username, content })
                });
                const data = await res.json();
                if (data.code === 0) {
                    showToast('✅ 回复成功');
                    document.getElementById(`replyContent-${postId}`).value = '';
                    await fetchPosts();
                    // 重新展开回复框
                    document.getElementById(`reply-${postId}`).classList.add('show');
                } else {
                    showToast('❌ ' + data.msg);
                }
            } catch (e) {
                showToast('❌ 网络错误');
            }
        }

        // 启动
        fetchPosts();
    </script>
</body>
</html>
